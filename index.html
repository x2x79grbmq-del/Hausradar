<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HausRadar V4</title>
<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:#fff}
header{padding:15px;background:#111827;text-align:center;font-size:22px;font-weight:bold}
nav{display:flex;justify-content:space-around;background:#1f2937;padding:10px;position:sticky;top:0}
nav button{background:#374151;color:#fff;border:0;padding:10px 14px;border-radius:10px}
section{display:none;padding:15px}
section.active{display:block}
.card{background:#111827;padding:12px;border-radius:14px;margin-bottom:12px}
input,select,textarea{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:0;background:#1f2937;color:#fff}
button.main{width:100%;padding:12px;background:#10b981;border:0;border-radius:10px;color:#fff;font-weight:bold}
.small{font-size:13px;color:#9ca3af}
.badge{background:#ef4444;padding:3px 8px;border-radius:999px;font-size:12px}
</style>
</head>
<body>

<header>🏚️ HausRadar V4</header>

<nav>
<button onclick="showTab('home')">Home</button>
<button onclick="showTab('map')">Map</button>
<button onclick="showTab('lost')">Lost</button>
<button onclick="showTab('admin')">Admin</button>
</nav>

<section id="home" class="active">
<div class="card">
<h3>Willkommen</h3>
<p>Die echte HausRadar App mit Orten, Lost Places und Adminbereich.</p>
</div>

<div class="card">
<h3>Ort melden</h3>
<input id="name" placeholder="Ort Name">
<input id="city" placeholder="Stadt">
<select id="type">
<option>Haus</option>
<option>Wohnung</option>
<option>Lost Place</option>
</select>
<textarea id="desc" placeholder="Beschreibung"></textarea>
<button class="main" onclick="savePlace()">Speichern</button>
</div>

<div id="list"></div>
</section>

<section id="map">
<div class="card">
<h3>🗺️ Karte</h3>
<p>Demo Map mit Orten.</p>
<iframe
width="100%"
height="400"
style="border:0;border-radius:14px"
loading="lazy"
allowfullscreen
src="https://maps.google.com/maps?q=Berlin&t=&z=5&ie=UTF8&iwloc=&output=embed">
</iframe>
</div>
</section>

<section id="lost">
<div class="card">
<h3>🏚️ Lost Places</h3>
<div id="lostList"></div>
</div>
</section>

<section id="admin">
<div class="card">
<h3>🔒 Admin Login</h3>
<input id="pw" type="password" placeholder="Passwort">
<button class="main" onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none">
<div class="card">
<h3>Admin Bereich</h3>
<p class="badge">Eingeloggt</p>
<button class="main" onclick="clearAll()">Alle Orte löschen</button>
</div>
</div>
</section>

<script>
function showTab(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

function getData(){
return JSON.parse(localStorage.getItem("places")||"[]");
}

function setData(data){
localStorage.setItem("places",JSON.stringify(data));
}

function savePlace(){
let data=getData();
data.push({
name:document.getElementById("name").value,
city:document.getElementById("city").value,
type:document.getElementById("type").value,
desc:document.getElementById("desc").value
});
setData(data);
render();
alert("Gespeichert");
}

function render(){
let data=getData();
let list=document.getElementById("list");
let lost=document.getElementById("lostList");
list.innerHTML="";
lost.innerHTML="";
data.forEach((x,i)=>{
let html=`<div class='card'><b>${x.name}</b><br>${x.city}<br><span class='small'>${x.type}</span><br>${x.desc}</div>`;
list.innerHTML+=html;
if(x.type==="Lost Place"){lost.innerHTML+=html;}
});
}

function login(){
if(document.getElementById("pw").value==="admin123"){
document.getElementById("adminPanel").style.display="block";
alert("Login erfolgreich");
}else{
alert("Falsches Passwort");
}
}

function clearAll(){
localStorage.removeItem("places");
render();
alert("Gelöscht");
}

render();
</script>

</body>
</html>
