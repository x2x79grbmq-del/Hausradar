<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HausRadar + Ghost Box</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
nav{position:fixed;bottom:0;width:100%;display:flex}
nav button{flex:1;padding:15px;background:#111;color:#fff;border:none}
.screen{display:none;height:100vh;align-items:center;justify-content:center}
.active{display:flex}
#ghostWord{font-size:60px;color:red}
</style>
</head>
<body>

<div id="home" class="screen active">HOME</div>

<div id="ghost" class="screen">
<div id="ghostWord"></div>
<input id="q" placeholder="Frage..." style="position:absolute;bottom:80px;width:80%">
<button onclick="ask()" style="position:absolute;bottom:20px;width:80%">Frage</button>
</div>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('ghost')">Ghost</button>
</nav>

<script>
let lastQ="",id=0,timeout;

function show(s){
document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
document.getElementById(s).classList.add('active');
}

function speak(t){
let u=new SpeechSynthesisUtterance(t);
u.lang='de-DE';
speechSynthesis.speak(u);
}

function answer(){
let words=["hinter","geh","dämon","hier"];
let w=words[Math.floor(Math.random()*words.length)];
document.getElementById("ghostWord").innerText=w;
speak(w);
}

function ask(){
let q=document.getElementById("q").value;
if(!q)return;
id++;
if(timeout)clearTimeout(timeout);

let delay=2000+Math.random()*28000;

timeout=setTimeout(()=>{
if(Math.random()<0.5)answer();
},delay);
}
</script>

</body>
</html>
