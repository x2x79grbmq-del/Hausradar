<!DOCTYPE html><html lang='de'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HausRadar</title>
<style>
body{margin:0;font-family:Arial;background:#0b0f10;color:#fff} .app{max-width:430px;margin:auto;padding:20px}
.card{background:#151b1d;border:1px solid #2b3430;border-radius:18px;padding:16px;margin:12px 0}
button,a{display:block;width:100%;padding:14px;border-radius:14px;border:0;background:#98ff2f;color:#111;font-weight:700;text-align:center;text-decoration:none;margin-top:10px}
input,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #333;background:#0f1314;color:#fff;margin-top:8px}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:auto;display:flex;background:#111;padding:10px}
.nav a{margin:0 4px;background:#1a2022;color:#fff}
h1,h2{margin:6px 0}
.small{color:#9aa}
</style></head><body><div class='app'>
<h1>🏚 HausRadar Light</h1>
<div class='small'>Online Version für GitHub Pages</div>

<div class='card'><h2>Home</h2>
<a href='#scanner'>Scanner</a>
<a href='#orte'>Verlassene Orte</a>
<a href='#premium'>Premium</a>
</div>

<div class='card' id='scanner'><h2>Scanner</h2>
<input type='file'><button onclick="alert('Demo Analyse: Vegetation erkannt')">Analysieren</button></div>

<div class='card' id='orte'><h2>Verlassene Orte</h2>
<input placeholder='Name des Ortes'>
<input placeholder='Koordinaten'>
<textarea placeholder='Kommentar'></textarea>
<button onclick="alert('Ort gespeichert (Demo)')">Speichern</button>
</div>

<div class='card' id='premium'><h2>Premium</h2>
<p>Pro 5,99 € / Premium 9,99 €</p>
<button onclick="alert('Später Stripe einbauen')">Upgrade</button></div>

<div style='height:90px'></div></div>
<div class='nav'>
<a href='#'>Home</a><a href='#scanner'>Scan</a><a href='#orte'>Orte</a><a href='#premium'>Pro</a>
</div></body></html>
